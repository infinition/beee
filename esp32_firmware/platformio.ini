; PlatformIO Project Configuration File for ESP32-S3 Faceplate
;
; Board version: Waveshare ESP32-S3-Touch-LCD-1.47 (N16R8)

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Memory configuration for 16MB Flash and 8MB PSRAM (OPI)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLWIP_IPV6=0

; Auto-download dependencies from PlatformIO Registry
lib_deps =
    links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^7.0.4
